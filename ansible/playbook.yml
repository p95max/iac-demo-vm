---
- name: Provision VM and deploy HYLASTIX stack
  hosts: web
  become: yes

  tasks:
    - name: Install prerequisites
      apt:
        update_cache: yes
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present

    - name: Add Docker GPG key
      ansible.builtin.shell: |
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        chmod a+r /etc/apt/keyrings/docker.gpg
      args:
        creates: /etc/apt/keyrings/docker.gpg

    - name: Add Docker apt repository
      ansible.builtin.shell: |
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" > /etc/apt/sources.list.d/docker.list
      args:
        creates: /etc/apt/sources.list.d/docker.list

    - name: Update apt cache after adding Docker repo
      apt:
        update_cache: yes

    - name: Install Docker Engine + Compose plugin
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    - name: Enable and start Docker
      systemd:
        name: docker
        enabled: yes
        state: started

    - name: Add azureuser to docker group
      user:
        name: azureuser
        groups: docker
        append: yes

    - name: Create app directory
      file:
        path: /opt/hylastix
        state: directory
        mode: "0755"

    - name: Copy docker stack to VM
      copy:
        src: "{{ playbook_dir }}/../docker/"
        dest: /opt/hylastix/
        directory_mode: "0755"

    - name: Write base .env from GitHub secret
      copy:
        dest: /opt/hylastix/.env
        content: "{{ lookup('env', 'DOCKER_ENV_FILE') }}"
        mode: "0600"

    - name: Append PUBLIC_URL/KEYCLOAK_URL/OIDC_ISSUER using VM IP
      lineinfile:
        path: /opt/hylastix/.env
        line: "{{ item }}"
        create: yes
      loop:
        - "PUBLIC_URL=http://{{ inventory_hostname }}"
        - "KEYCLOAK_URL=http://{{ inventory_hostname }}:8080"
        - "OIDC_ISSUER=http://{{ inventory_hostname }}:8080/realms/master"

    - name: Start docker compose stack
      command: docker compose up -d
      args:
        chdir: /opt/hylastix

    - name: Wait for HTTP 200 from nginx
      uri:
        url: http://localhost/
        status_code: 200
      register: http_check
      retries: 20
      delay: 3
      until: http_check.status == 200