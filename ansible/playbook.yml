- hosts: web
  become: yes

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install required packages
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present

    - name: Install Docker
      apt:
        name:
          - docker.io
          - docker-compose-plugin
        state: present

    - name: Enable Docker
      systemd:
        name: docker
        enabled: yes
        state: started

    - name: Add azureuser to docker group
      user:
        name: azureuser
        groups: docker
        append: yes

    - name: Create app directory
      file:
        path: /opt/hylastix
        state: directory
        mode: "0755"

    - name: Copy docker stack to VM
      copy:
        src: ../docker/
        dest: /opt/hylastix/
        directory_mode: "0755"

    - name: Start docker compose stack
      command: docker compose up -d
      args:
        chdir: /opt/hylastix

    - name: Wait for HTTP 200 from nginx
      uri:
        url: http://localhost/
        status_code: 200
      register: http_check
      retries: 20
      delay: 3
      until: http_check.status == 200