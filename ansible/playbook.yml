---
- name: Provision VM and deploy HYLASTIX stack
  hosts: web
  become: yes

  vars:
    app_dir: /opt/hylastix
    compose_dir: /opt/hylastix/docker
    compose_file: "{{ compose_dir }}/docker-compose.yml"

  tasks:
    - name: Install prerequisites
      apt:
        update_cache: yes
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present

    - name: Add Docker GPG key
      shell: |
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        chmod a+r /etc/apt/keyrings/docker.gpg
      args:
        creates: /etc/apt/keyrings/docker.gpg

    - name: Add Docker apt repository
      shell: |
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" > /etc/apt/sources.list.d/docker.list
      args:
        creates: /etc/apt/sources.list.d/docker.list

    - name: Update apt cache after adding Docker repo
      apt:
        update_cache: yes

    - name: Install Docker Engine + Compose plugin
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    - name: Enable and start Docker
      systemd:
        name: docker
        enabled: yes
        state: started

    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        mode: "0755"

    - name: Copy docker stack to VM
      copy:
        src: "{{ playbook_dir }}/../docker/"
        dest: "{{ compose_dir }}/"
        directory_mode: "0755"

    - name: Write base .env from GitHub secret
      copy:
        dest: "{{ app_dir }}/.env"
        content: "{{ lookup('env', 'DOCKER_ENV_FILE') }}"
        mode: "0600"

    - name: Ensure dynamic URLs are present in .env
      lineinfile:
        path: "{{ app_dir }}/.env"
        regexp: "^{{ item.key }}="
        line: "{{ item.key }}={{ item.value }}"
        create: yes
      loop:
        - { key: "PUBLIC_URL",   value: "http://{{ inventory_hostname }}" }
        - { key: "KEYCLOAK_URL", value: "http://{{ inventory_hostname }}:8080" }
        - { key: "OIDC_ISSUER",  value: "http://{{ inventory_hostname }}:8080/realms/master" }

    - name: Start docker compose stack
      command: >
        docker compose
        -f {{ compose_dir }}/docker-compose.yml
        --env-file {{ app_dir }}/.env
        up -d --remove-orphans

    - name: Wait for Keycloak to be ready
      command: >
        docker exec docker-keycloak-1
        /opt/keycloak/bin/kcadm.sh config credentials
        --server http://localhost:8080
        --realm master
        --user admin
        --password {{ lookup('ini', 'KEYCLOAK_ADMIN_PASSWORD type=properties file=' + app_dir + '/.env') }}
      retries: 30
      delay: 10
      register: kc_login
      until: kc_login.rc == 0

    - name: Disable SSL requirement in Keycloak master realm
      command: >
        docker exec docker-keycloak-1
        /opt/keycloak/bin/kcadm.sh update realms/master
        -s sslRequired=NONE

    - name: Get admin user ID from Keycloak
      command: >
        docker exec docker-keycloak-1
        /opt/keycloak/bin/kcadm.sh get users
        --realm master -q username=admin
      register: kc_admin_user

    - name: Set admin email and mark as verified
      command: >
        docker exec docker-keycloak-1 bash -c "
        ID=$(echo '{{ kc_admin_user.stdout }}' | grep '\"id\"' | head -1 | grep -oP '\"id\" : \"\K[^\"]+') &&
        /opt/keycloak/bin/kcadm.sh update users/$ID --realm master
        -s email=admin@local.dev
        -s emailVerified=true"

    - name: Create nginx OIDC client in Keycloak
      command: >
        docker exec docker-keycloak-1
        /opt/keycloak/bin/kcadm.sh create clients --realm master
        -s clientId=nginx
        -s enabled=true
        -s publicClient=false
        -s secret={{ lookup('ini', 'OAUTH2_PROXY_CLIENT_SECRET type=properties file=' + app_dir + '/.env') }}
        -s redirectUris='["http://{{ inventory_hostname }}/oauth2/callback"]'
        -s webOrigins='["http://{{ inventory_hostname }}"]'
      ignore_errors: yes