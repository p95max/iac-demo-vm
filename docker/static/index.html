<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>HYLASTIX Cloud Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow">
        <div class="card-body d-flex justify-content-between align-items-center">
            <div>
                <h1 class="card-title">Access granted</h1>
                <p class="card-text">
                    This static page is protected by Keycloak authentication.
                </p>
            </div>
            <a href="/oauth2/sign_out" class="btn btn-outline-danger">Logout</a>
        </div>
    </div>
</div>

<div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
  <div id="jsToast" class="toast text-bg-success border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body">
        JavaScript is working correctly.
      </div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const toastElement = document.getElementById('jsToast');
        const toast = new bootstrap.Toast(toastElement);
        toast.show();
        console.log("Static page loaded successfully.");
    });
</script>

</body>
</html>
